name: Reusable — SPA Deploy (S3 + CloudFront)

on:
  workflow_call:
    inputs:
      environment:
        description: "GitHub Environment name (dev | preprod | prod)"
        required: true
        type: string
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: "eu-west-1"
      node_version:
        description: "Node.js version"
        required: false
        type: string
        default: "20"
      build_script:
        description: "npm build script"
        required: false
        type: string
        default: "build"
      dist_directory:
        description: "Build output directory to sync to S3"
        required: false
        type: string
        default: "dist"
      checkout_ref:
        description: "Git ref to checkout (tag, SHA, branch). Defaults to triggering ref."
        required: false
        type: string
        default: ""
      submodules:
        description: "Check out submodules (true | recursive | false)"
        required: false
        type: string
        default: "false"
      update_submodules:
        description: "Run git submodule update --remote after checkout to pull latest from submodule remotes"
        required: false
        type: boolean
        default: false
    secrets:
      AWS_DEPLOY_ROLE_ARN:
        required: true
      S3_BUCKET:
        required: true
      CLOUDFRONT_DISTRIBUTION_ID:
        required: true
      SUBMODULES_TOKEN:
        description: "PAT with repo scope for checking out private submodules"
        required: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.checkout_ref }}
          submodules: ${{ inputs.submodules }}
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}

      - name: Update submodules to latest remote
        if: inputs.update_submodules
        run: git submodule update --remote --merge

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run ${{ inputs.build_script }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Sync to S3
        run: |
          aws s3 sync ${{ inputs.dist_directory }}/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html"
          # index.html gets no-cache so users always get the latest entry point
          aws s3 cp ${{ inputs.dist_directory }}/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
