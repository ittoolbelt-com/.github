name: Reusable — Terraform Plan

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Terraform working directory (e.g. environments/dev)"
        required: true
        type: string
      state_key:
        description: "S3 state key (e.g. platform/control-plane/dev/terraform.tfstate)"
        required: true
        type: string
      state_bucket:
        description: "S3 bucket name for Terraform remote state"
        required: true
        type: string
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: "eu-west-1"
    secrets:
      AWS_ROLE_ARN:
        required: true

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Terraform Init
        run: |
          terraform -chdir=${{ inputs.working_directory }} init \
            -backend-config="bucket=${{ inputs.state_bucket }}" \
            -backend-config="key=${{ inputs.state_key }}" \
            -backend-config="region=${{ inputs.aws_region }}"

      - name: Terraform Format Check
        run: terraform -chdir=${{ inputs.working_directory }} fmt -check -recursive

      - name: Terraform Validate
        run: terraform -chdir=${{ inputs.working_directory }} validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform -chdir=${{ inputs.working_directory }} plan \
            -var-file=terraform.tfvars \
            -no-color \
            -out=tfplan 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... (truncated)'
              : plan;
            const body = `### Terraform Plan \`${{ inputs.working_directory }}\`\n\n\`\`\`terraform\n${truncated}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
